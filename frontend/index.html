<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Student Registry</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main class="container">
      <header class="page-header">
        <div>
          <h1>Student Registry</h1>
          <p class="subtitle">Create, edit, search, and manage student records.</p>
        </div>
        <div id="status" class="status">Ready</div>
      </header>

      <section class="card toolbar">
        <div class="field">
          <label for="search">Search</label>
          <input id="search" type="text" placeholder="Name or email" />
        </div>

        <div class="field">
          <label for="sort">Sort</label>
          <select id="sort">
            <option value="newest">Newest</option>
            <option value="oldest">Oldest</option>
            <option value="name_asc">Name A-Z</option>
            <option value="name_desc">Name Z-A</option>
            <option value="age_asc">Age Low-High</option>
            <option value="age_desc">Age High-Low</option>
          </select>
        </div>

        <div class="toolbar-actions">
          <button id="refresh-btn" class="secondary" type="button">Refresh</button>
          <button id="clear-search-btn" class="ghost" type="button">Clear</button>
        </div>

        <div id="stats" class="stats">Showing 0 of 0</div>
      </section>

      <section class="card">
        <h2 id="form-title">Create Student</h2>
        <form id="student-form">
          <input type="hidden" id="student-id" />

          <div class="form-grid">
            <label>
              Name
              <input type="text" id="name" required />
            </label>

            <label>
              Email
              <input type="email" id="email" required />
            </label>

            <label>
              Age
              <input type="number" id="age" min="1" max="150" required />
            </label>
          </div>

          <div class="actions">
            <button type="submit" id="submit-btn">Create</button>
            <button type="button" id="cancel-btn" class="secondary">Cancel</button>
          </div>
        </form>
      </section>

      <section class="card">
        <h2>Students</h2>
        <div class="table-wrap">
          <table id="students-table">
            <thead>
              <tr>
                <th>Name</th>
                <th>Email</th>
                <th>Age</th>
                <th>Actions</th>
              </tr>
            </thead>
            <tbody></tbody>
          </table>
        </div>
      </section>
    </main>

    <script src="script.js"></script>
  </body>
</html>
